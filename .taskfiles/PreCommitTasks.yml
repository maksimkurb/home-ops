---
version: "3"

tasks:

  init:
    desc: Install repo-local pre-commit environment and hooks
    cmds:
      - "{{.PROJECT_DIR}}/scripts/pre-commit install"

  update:
    desc: Update pre-commit hooks
    cmds:
      - "{{.PROJECT_DIR}}/scripts/pre-commit update"

  run:
    desc: Run pre-commit on all files
    cmds:
      - "{{.PROJECT_DIR}}/scripts/pre-commit run"
