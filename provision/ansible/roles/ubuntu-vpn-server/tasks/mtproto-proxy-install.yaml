---
- name: mtproto / Validate required variables
  assert:
    that:
      - vpn_tgproxy_mtproto is defined
      - vpn_tgproxy_mtproto | length > 0
      - vpn_tgproxy_mtproto | selectattr('port', 'defined') | list | length == vpn_tgproxy_mtproto | length
      - vpn_tgproxy_mtproto | selectattr('secret', 'defined') | list | length == vpn_tgproxy_mtproto | length
    fail_msg: >-
      Missing MTProto configuration. Define vpn_tgproxy_mtproto as a list
      of items with port and secret keys.

- name: mtproto / Create config directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  with_items:
    - /opt/mtproto-proxy
    - /opt/mtproto-proxy/data

- name: mtproto / Create legacy proxy data directories
  file:
    path: "/opt/mtproto-proxy/data/mtproto_{{ ansible_loop.index }}"
    state: directory
    mode: '0755'
  loop: "{{ vpn_tgproxy_mtproto }}"
  loop_control:
    extended: true
  when: (item.secret | string | length) < 42

- name: mtproto / Create docker-compose.yml file
  template:
    src: mtproto-proxy/docker-compose.yml.j2
    dest: "/opt/mtproto-proxy/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'

- name: mtproto / Deploy with docker-compose
  community.docker.docker_compose_v2:
    project_src: "/opt/mtproto-proxy"
    state: present

- name: mtproto / Restart with docker-compose
  community.docker.docker_compose_v2:
    project_src: "/opt/mtproto-proxy"
    state: restarted

- name: mtproto / Build connection URLs
  set_fact:
    tgproxy_mtproto_host: "{{ ansible_host | default(ansible_default_ipv4.address, true) | default(inventory_hostname, true) }}"
    tgproxy_mtproto_bindings: "{{ vpn_tgproxy_mtproto }}"

- name: mtproto / Print MTProto proxy URLs
  debug:
    msg: |
      MTProto proxy URLs:
      {% for binding in tgproxy_mtproto_bindings %}
      - https://t.me/proxy?server={{ tgproxy_mtproto_host }}&port={{ binding.port }}&secret={{ binding.secret }}
      {% endfor %}
