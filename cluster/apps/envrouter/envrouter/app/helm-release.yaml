---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ${APP}
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.0.1
  url: oci://ghcr.io/maksimkurb/envrouter-helm/envrouter
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
  namespace: envrouter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: ${APP}
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    replicaCount: 1

    config:
      namespaces:
        - dev1
        - dev2
        - dev3
        - dev4
        - qa1
        - qa2
        - qa3
        - qa4
      hsts: true
      apiToken:
        existingSecret: envrouter
        existingSecretKey: api-token
      trustedProxies:
        - "${NETWORK_K8S_CLUSTER_CIDR}"
        - "${NETWORK_BGP_SVC_RANGE}"
        - "${SVC_NGINX_ADDR}/32"
      oidc:
        enabled: true
        issuer: "https://auth.${SECRET_PUBLIC_DOMAIN}"
        clientId:
          existingSecret: envrouter
          existingSecretKey: oidc-client-id
        clientSecret:
          existingSecret: envrouter
          existingSecretKey: oidc-client-secret
        redirectUrl: "https://envrouter.${SECRET_PUBLIC_DOMAIN}/auth/callback"

    ingress:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        external-dns.alpha.kubernetes.io/target: ${INGRESS_DEFAULT}
        external-dns.alpha.kubernetes.io/cloudflare-proxied: ${quote}${INGRESS_DEFAULT_CF_PROXY}${quote}
      hosts:
        - host: "envrouter.${SECRET_PUBLIC_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
