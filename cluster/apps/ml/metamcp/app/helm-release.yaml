---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
  namespace: ml
  labels:
    app.kubernetes.io/name: ${APP}
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/metatool-ai/metamcp
              tag: 2.4.22
              pullPolicy: IfNotPresent
            env:
              TZ: "${TIMEZONE_FAILSAFE}"
              NODE_ENV: production
              LOG_LEVEL: info
              APP_URL: https://metamcp.${SECRET_PRIVATE_DOMAIN}
              NEXT_PUBLIC_APP_URL: https://metamcp.${SECRET_PRIVATE_DOMAIN}
              OIDC_CLIENT_ID: metamcp
              OIDC_DISCOVERY_URL: https://auth.${SECRET_PUBLIC_DOMAIN}/.well-known/openid-configuration
              OIDC_PROVIDER_ID: authelia
              OIDC_SCOPES: openid email profile groups
              OIDC_PKCE: "true"
              BETTER_AUTH_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-secret
                    key: BETTER_AUTH_SECRET
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-secret
                    key: OIDC_CLIENT_SECRET
              POSTGRES_HOST: homelab-pgsql.database
              POSTGRES_PORT: "5432"
              POSTGRES_DB: metamcp
              POSTGRES_USER: metamcp
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-secret
                    key: POSTGRES_PASSWORD
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-secret
                    key: DATABASE_URL
              TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 12008
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 12008
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 12008
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: app
        ports:
          http:
            port: &port 12008

    ingress:
      app:
        enabled: true
        className: "nginx-intra"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/icon: /icons/server/${HOMEPAGE_ICONS_COLOR}
          gethomepage.dev/name: MetaMCP
          nginx.ingress.kubernetes.io/proxy-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        hosts:
          - host: "metamcp.${SECRET_PRIVATE_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: *port
