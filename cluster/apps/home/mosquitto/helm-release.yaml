---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
  namespace: home
spec:
  interval: 30m
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts/
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:

    controller:
      annotations:
        reloader.stakater.com/auto: "true"

    service:
      main:
        controller: main
        type: LoadBalancer
        externalTrafficPolicy: Local
        loadBalancerIP: "${SVC_MQTT_ADDR}"
        annotations:
          io.cilium/lb-ipam-ips: "${SVC_MQTT_ADDR}"
        ports:
          mqtt:
            enabled: true
            port: 1883

    persistence:
      data:
        enabled: true
        existingClaim: mosquitto-external-config
        globalMounts:
          - path: /data
      config:
        enabled: true
        type: custom
        volumeSpec:
          secret:
            secretName: mosquitto
        advancedMounts:
          main:
            main:
              - path: /mosquitto/config/mosquitto.conf
                subPath: mosquitto.conf
                readOnly: true
              - path: /mosquitto/config/mosquitto_pwd
                subPath: mosquitto_pwd
                readOnly: true
              - path: /mosquitto/config/acl
                subPath: acl
                readOnly: true

    defaultPodOptions:
      securityContext:
        runAsUser: 777
        runAsGroup: 777
        fsGroup: 777
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: docker.io/eclipse-mosquitto
              tag: 2.1.2-alpine
            resources:
              requests:
                cpu: 1m
                memory: 10M
              limits:
                memory: 100M
