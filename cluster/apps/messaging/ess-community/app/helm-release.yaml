---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: ${APP}
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 26.3.2
  url: oci://ghcr.io/element-hq/ess-helm/matrix-stack
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ${APP}
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    serverName: matrix.${SECRET_PUBLIC_DOMAIN}

    ingress:
      className: nginx
      controllerType: ingress-nginx
      tlsEnabled: false
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        external-dns.alpha.kubernetes.io/target: ${INGRESS_DEFAULT}
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"

    elementWeb:
      ingress:
        host: matrix.${SECRET_PUBLIC_DOMAIN}

    elementAdmin:
      ingress:
        host: admin.matrix.${SECRET_PUBLIC_DOMAIN}

    matrixAuthenticationService:
      ingress:
        host: account.matrix.${SECRET_PUBLIC_DOMAIN}
      additional:
        00-registration-token.yaml:
          config: |
            account:
              password_registration_enabled: true
              registration_token_required: true
        01-email.yaml:
          configSecret: ${APP}-mas-config
          configSecretKey: email.yaml
      postgres:
        host: homelab-pgsql.database.svc.cluster.local
        port: 5432
        user: messaging.mas
        database: mas
        sslMode: disable
        password:
          secret: messaging.mas.homelab-pgsql.credentials.postgresql.acid.zalan.do
          secretKey: password

    matrixRTC:
      ingress:
        host: mrtc.matrix.${SECRET_PUBLIC_DOMAIN}
        annotations:
          nginx.ingress.kubernetes.io/enable-cors: "true"
          nginx.ingress.kubernetes.io/cors-allow-origin: "https://matrix.${SECRET_PUBLIC_DOMAIN}, https://*.matrix.${SECRET_PUBLIC_DOMAIN}"
          nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
          nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, Content-Length, Accept-Encoding, X-CSRF-Token"
          nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 128Mi
      livenessProbe:
        failureThreshold: 6
        periodSeconds: 10
        timeoutSeconds: 5
      readinessProbe:
        failureThreshold: 6
        periodSeconds: 10
        timeoutSeconds: 5
      startupProbe:
        failureThreshold: 12
        periodSeconds: 10
        timeoutSeconds: 5
      sfu:
        manualIP: "${SECRET_COTURN_PUBLIC_IP}"
        useStunToDiscoverPublicIP: false
        exposedServices:
          rtcTcp:
            enabled: true
            portType: NodePort
            port: 30881
            internalTrafficPolicy: Cluster
            externalTrafficPolicy: Cluster
          rtcMuxedUdp:
            enabled: true
            portType: NodePort
            port: 30882
            internalTrafficPolicy: Cluster
            externalTrafficPolicy: Cluster

    postgres:
      enabled: false

    synapse:
      # Re-create DB manually to set collate:
      # CREATE DATABASE synapse
      # WITH
      # OWNER = 'messaging.synapse'
      # ENCODING = 'UTF8'
      # LC_COLLATE = 'C'
      # LC_CTYPE = 'C'
      # TEMPLATE = template0;
      postgres:
        host: homelab-pgsql.database.svc.cluster.local
        port: 5432
        user: messaging.synapse
        database: synapse
        sslMode: disable
        password:
          secret: messaging.synapse.homelab-pgsql.credentials.postgresql.acid.zalan.do
          secretKey: password
      ingress:
        host: synapse.matrix.${SECRET_PUBLIC_DOMAIN}
      media:
        storage:
          size: 20Gi
          storageClassName: local-path
      additional:
        00-user-directory.yaml:
          config: |
            user_directory:
              enabled: true
              search_all_users: true
              prefer_local_users: true
              exclude_remote_users: true
        01-matrix-rtc.yaml: # <--- ADD THIS BLOCK
          config: |
            matrix_rtc:
              enabled: true
              server_url: "https://mrtc.matrix.${SECRET_PUBLIC_DOMAIN}"
        # Configures TURN for legacy clients and standard signaling
        02-turn.yaml:
          config: |
            turn_uris:
              - "turn:turn.${SECRET_PUBLIC_DOMAIN}:3478?transport=udp"
              - "turn:turn.${SECRET_PUBLIC_DOMAIN}:3478?transport=tcp"
              - "turns:turn.${SECRET_PUBLIC_DOMAIN}:5349?transport=udp"
              - "turns:turn.${SECRET_PUBLIC_DOMAIN}:5349?transport=tcp"
            turn_shared_secret: "${SECRET_COTURN_KEY}"
            turn_user_lifetime: 86400000
            turn_allow_guests: true

    wellKnownDelegation:
      baseDomainRedirect:
        enabled: false
      additional:
        client: |
          {
            "org.matrix.msc4140.calls": {
              "preferred_backend": "matrix-org/livekit"
            }
          }
