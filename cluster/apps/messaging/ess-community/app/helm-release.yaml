---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: ${APP}
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 25.12.0
  url: oci://ghcr.io/element-hq/ess-helm/matrix-stack
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ${APP}
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    serverName: matrix.${SECRET_PUBLIC_DOMAIN}

    ingress:
      className: nginx
      controllerType: ingress-nginx
      tlsEnabled: false
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        external-dns.alpha.kubernetes.io/target: ${INGRESS_DEFAULT}
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"

    elementWeb:
      ingress:
        host: matrix.${SECRET_PUBLIC_DOMAIN}

    elementAdmin:
      ingress:
        host: admin.matrix.${SECRET_PUBLIC_DOMAIN}

    matrixAuthenticationService:
      ingress:
        host: account.matrix.${SECRET_PUBLIC_DOMAIN}
      postgres:
        host: homelab-pgsql.database.svc.cluster.local
        port: 5432
        user: messaging.mas
        database: mas
        sslMode: disable
        password:
          secret: messaging.mas.homelab-pgsql.credentials.postgresql.acid.zalan.do
          secretKey: password

    matrixRTC:
      ingress:
        host: mrtc.matrix.${SECRET_PUBLIC_DOMAIN}
      sfu:
        useStunToDiscoverPublicIP: true
        exposedServices:
          # Router/NAT must forward public 30881/TCP to a cluster node on 30881/TCP.
          rtcTcp:
            portType: NodePort
            port: 30881
            nodePort: 30881
            externalTrafficPolicy: Local
          # Router/NAT must forward public 30882/UDP to a cluster node on 30882/UDP.
          rtcMuxedUdp:
            portType: NodePort
            port: 30882
            nodePort: 30882
            externalTrafficPolicy: Local

    postgres:
      enabled: false

    synapse:
      postgres:
        host: homelab-pgsql.database.svc.cluster.local
        port: 5432
        user: messaging.synapse
        database: synapse
        sslMode: disable
        password:
          secret: messaging.synapse.homelab-pgsql.credentials.postgresql.acid.zalan.do
          secretKey: password
      ingress:
        host: synapse.matrix.${SECRET_PUBLIC_DOMAIN}
      media:
        storage:
          size: 20Gi
          storageClassName: local-path

    wellKnownDelegation:
      baseDomainRedirect:
        enabled: false
