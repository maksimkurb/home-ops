---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
  labels:
    app.kubernetes.io/name: ${APP}
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    persistence:
      coturn-config:
        enabled: true
        type: configMap
        name: ${APP}-config
        advancedMounts:
          coturn:
            main:
              - path: /etc/coturn/turnserver.conf
                subPath: turnserver.conf
                readOnly: true
      coturn-certificate:
        enabled: true
        type: secret
        name: ess-community-turn-tls
        advancedMounts:
          coturn:
            main:
              - path: /etc/coturn/tls/tls.crt
                subPath: tls.crt
                readOnly: true
              - path: /etc/coturn/tls/tls.key
                subPath: tls.key
                readOnly: true

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 777
        runAsGroup: 777
        fsGroup: 777
        seccompProfile:
          type: RuntimeDefault

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 256Mi

    controllers:
      coturn:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: coturn/coturn
              tag: 4.14.0
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -ec
              - |
                # Cilium forwards the LoadBalancer IP to this pod. Coturn
                # allocates relay sockets on the pod IP, so map that actual
                # relay address to the public WAN address in ICE candidates.
                exec turnserver \
                  -c /etc/coturn/turnserver.conf \
                  --static-auth-secret="$TURN_SHARED_SECRET" \
                  --external-ip="$TURN_PUBLIC_IP/$TURN_POD_IP"
            env:
              TZ: "${TIMEZONE}"
              TURN_SHARED_SECRET: "${SECRET_COTURN_KEY}"
              TURN_PUBLIC_IP: "${SECRET_COTURN_PUBLIC_IP}"
              TURN_POD_IP:
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP

    service:
      coturn:
        controller: coturn
        type: LoadBalancer
        loadBalancerIP: "${SVC_COTURN_ADDR}"
        annotations:
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/hostname: "turn.${SECRET_PUBLIC_DOMAIN}"
          external-dns.alpha.kubernetes.io/target: ${INGRESS_DEFAULT}
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        externalTrafficPolicy: Local
        ports:
          turn-tcp:
            port: 3478
            protocol: TCP
          turn-udp:
            port: 3478
            protocol: UDP
          turn-tls-tcp:
            port: 5349
            protocol: TCP
          turn-tls-udp:
            port: 5349
            protocol: UDP
