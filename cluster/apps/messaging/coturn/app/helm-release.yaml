---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
  labels:
    app.kubernetes.io/name: ${APP}
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      nameOverride: ${APP}

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: coturn/coturn
              tag: 4.7.0-r2
              pullPolicy: IfNotPresent
            command:
              - turnserver
              - -c
              - /etc/coturn/turnserver.conf
            env:
              TZ: "${TIMEZONE}"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      main:
        controller: main
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "turn.${SECRET_PUBLIC_DOMAIN}"
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        ports:
          turn-udp:
            port: 3478
            protocol: UDP
          turn-tcp:
            port: 3478
            protocol: TCP
          turns-tcp:
            port: 5349
            protocol: TCP
          relay-49160:
            port: 49160
            protocol: UDP
          relay-49161:
            port: 49161
            protocol: UDP
          relay-49162:
            port: 49162
            protocol: UDP
          relay-49163:
            port: 49163
            protocol: UDP
          relay-49164:
            port: 49164
            protocol: UDP
          relay-49165:
            port: 49165
            protocol: UDP
          relay-49166:
            port: 49166
            protocol: UDP
          relay-49167:
            port: 49167
            protocol: UDP
          relay-49168:
            port: 49168
            protocol: UDP
          relay-49169:
            port: 49169
            protocol: UDP
          relay-49170:
            port: 49170
            protocol: UDP
          relay-49171:
            port: 49171
            protocol: UDP
          relay-49172:
            port: 49172
            protocol: UDP
          relay-49173:
            port: 49173
            protocol: UDP
          relay-49174:
            port: 49174
            protocol: UDP
          relay-49175:
            port: 49175
            protocol: UDP
          relay-49176:
            port: 49176
            protocol: UDP
          relay-49177:
            port: 49177
            protocol: UDP
          relay-49178:
            port: 49178
            protocol: UDP
          relay-49179:
            port: 49179
            protocol: UDP

    persistence:
      config:
        enabled: true
        type: secret
        name: ${APP}
        globalMounts:
          - path: /etc/coturn/turnserver.conf
            subPath: turnserver.conf
            readOnly: true
      tls:
        enabled: true
        type: secret
        name: ${APP}-tls
        globalMounts:
          - path: /tls/tls.crt
            subPath: tls.crt
            readOnly: true
          - path: /tls/tls.key
            subPath: tls.key
            readOnly: true

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 777
        runAsGroup: 777
        fsGroup: 777
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
