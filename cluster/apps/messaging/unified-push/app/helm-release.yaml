---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: docker.io/binwiederhier/ntfy
              tag: v2.24.0
              pullPolicy: IfNotPresent
            args:
              - serve
            env:
              TZ: "${TIMEZONE}"
              NTFY_BASE_URL: "https://${APP}.${SECRET_PUBLIC_DOMAIN}"
              NTFY_LISTEN_HTTP: ":80"
              NTFY_BEHIND_PROXY: "true"
              NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
              NTFY_ATTACHMENT_CACHE_DIR: /var/cache/ntfy/attachments
              NTFY_UPSTREAM_BASE_URL: https://ntfy.sh
              NTFY_WEB_PUSH_PUBLIC_KEY: "${NTFY_WEB_PUSH_PUBLIC_KEY}"
              NTFY_WEB_PUSH_PRIVATE_KEY: "${SECRET_NTFY_WEB_PUSH_PRIVATE_KEY}"
              NTFY_WEB_PUSH_FILE: /var/cache/ntfy/webpush.db
              NTFY_WEB_PUSH_EMAIL_ADDRESS: "${SECRET_EMAIL}"
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 256Mi
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /v1/health
              readiness:
                enabled: true
                type: HTTP
                path: /v1/health
              startup:
                enabled: true
                type: HTTP
                path: /v1/health
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

    service:
      main:
        controller: main
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/target: ${INGRESS_DEFAULT}
          external-dns.alpha.kubernetes.io/cloudflare-proxied: ${quote}${INGRESS_DEFAULT_CF_PROXY}${quote}
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          nginx.ingress.kubernetes.io/proxy-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Messaging
          gethomepage.dev/icon: /icons/ntfy/${HOMEPAGE_ICONS_COLOR}
          gethomepage.dev/name: UnifiedPush
        hosts:
          - host: "${APP}.${SECRET_PUBLIC_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http

    persistence:
      cache:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: local-path
        retain: true
        globalMounts:
          - path: /var/cache/ntfy

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
