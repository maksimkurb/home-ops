# Initialize the site after Flux has deployed Frappe:
#
#   kubectl -n default exec -it deployment/frappe-main -c backend -- bash
#
# Run inside the backend container:
#
# ls -1 apps > sites/apps.txt
# bench set-config -g db_host homelab-pgsql.database.svc.cluster.local
# bench set-config -gp db_port 5432
# bench set-config -g redis_cache redis://frappe-redis:6379
# bench set-config -g redis_queue redis://frappe-redis:6379
# bench set-config -g redis_socketio redis://frappe-redis:6379
# bench set-config -gp socketio_port 9000
#
# bench new-site "$SITE_NAME" \
#   --db-type postgres \
#   --db-host homelab-pgsql.database.svc.cluster.local \
#   --db-port 5432 \
#   --db-name "frappe" \
#   --db-user "$POSTGRES_USER" \
#   --db-password "$POSTGRES_PASSWORD" \
#   --admin-password "$ADMIN_PASSWORD" \
#   --no-setup-db \
#   --set-default
#
# bench --site "$SITE_NAME" set-config encryption_key "$ENCRYPTION_KEY"
# bench --site "$SITE_NAME" migrate
# bench --site "$SITE_NAME" list-apps
# bench --site "$SITE_NAME" enable-scheduler
#
# Keep encryption-key unchanged for the lifetime of the site. It is required
# to decrypt Password fields after restoring the database or site config.
