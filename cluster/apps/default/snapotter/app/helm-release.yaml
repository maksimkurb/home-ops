---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
    timeout: 15m0s
  upgrade:
    remediation:
      retries: 5
    timeout: 15m0s
  values:

    global:
      nameOverride: ${APP}

    service:
      main:
        controller: main
        ports:
          http:
            port: &port 1349

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/target: ${INGRESS_DEFAULT}
          external-dns.alpha.kubernetes.io/cloudflare-proxied: ${quote}${INGRESS_DEFAULT_CF_PROXY}${quote}
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          nginx.ingress.kubernetes.io/proxy-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
          # ForwardAuth start
          nginx.ingress.kubernetes.io/auth-method: GET
          nginx.ingress.kubernetes.io/auth-url: |-
            http://authelia.security.svc.cluster.local:8000/api/verify
          nginx.ingress.kubernetes.io/auth-signin: |-
            https://auth.${SECRET_PUBLIC_DOMAIN}?rm=$request_method
          nginx.ingress.kubernetes.io/auth-response-headers: |-
            Remote-User,Remote-Name,Remote-Groups,Remote-Email
          nginx.ingress.kubernetes.io/auth-snippet: |
            proxy_set_header X-Forwarded-Method $request_method;
          # ForwardAuth end
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/icon: mdi-image-edit
          gethomepage.dev/name: SnapOtter
        hosts:
          - host: snapotter.${SECRET_PUBLIC_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: *port

    persistence:
      data:
        enabled: true
        existingClaim: snapotter-data
        globalMounts:
          - path: /data
      workspace:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp/workspace

    defaultPodOptions:
      securityContext:
        runAsUser: 777
        runAsGroup: 777
        fsGroup: 777
        supplementalGroups:
          - 777
        fsGroupChangePolicy: "OnRootMismatch"

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/snapotter-hq/snapotter
              tag: 1.17.2
            env:
              TZ: "${TIMEZONE}"
              AUTH_ENABLED: "true"
              ANALYTICS_ENABLED: "false"
              TRUST_PROXY: "true"
              RATE_LIMIT_PER_MIN: "100"
              DEFAULT_USERNAME: admin
              DEFAULT_PASSWORD: "${SECRET_SNAPOTTER_DEFAULT_PASSWORD}"
              DB_PATH: /data/snapotter.db
              FILES_STORAGE_PATH: /data/files
              WORKSPACE_PATH: /tmp/workspace
              EXTERNAL_URL: "https://snapotter.${SECRET_PUBLIC_DOMAIN}"
              COOKIE_SECRET: "${SECRET_SNAPOTTER_COOKIE_SECRET}"
              OIDC_ENABLED: "true"
              OIDC_ISSUER_URL: "https://auth.${SECRET_PUBLIC_DOMAIN}"
              OIDC_CLIENT_ID: snapotter
              OIDC_CLIENT_SECRET: "${SECRET_SNAPOTTER_OAUTH_CLIENT_SECRET}"
              OIDC_PROVIDER_NAME: Authelia
              OIDC_SCOPES: "openid profile email"
              OIDC_AUTO_CREATE_USERS: "true"
              OIDC_AUTO_LINK_USERS: "true"
              OIDC_DEFAULT_ROLE: user
              OIDC_USERNAME_CLAIM: preferred_username
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
            probes:
              liveness: &probe
                enabled: true
                type: HTTP
                path: /api/v1/health
              readiness: *probe
              startup:
                <<: *probe
                spec:
                  failureThreshold: 60
                  periodSeconds: 5
