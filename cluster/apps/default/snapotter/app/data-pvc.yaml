---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapotter-data
  namespace: default
  labels:
    app.kubernetes.io/name: snapotter
    app.kubernetes.io/instance: snapotter
    snapshot.home.arpa/enabled: "true"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
