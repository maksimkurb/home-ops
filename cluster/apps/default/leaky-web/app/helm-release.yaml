---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app leaky-web
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/maksimkurb/leaky-web
              tag: latest
              pullPolicy: Always
            env:
              HOST: 0.0.0.0
              PORT: "8080"
              TRUST_PROXY_HOPS: "1"
              # STUN remains useful for direct paths. TURN credentials are minted
              # by the app from Coturn's shared REST-auth secret.
              BROWSER_ICE_SERVERS_JSON: '[{"urls":["stun:turn.${SECRET_PUBLIC_DOMAIN}:3478"]}]'
              SERVER_ICE_SERVERS: "stun:turn.${SECRET_PUBLIC_DOMAIN}:3478"
              TURN_HOST: "turn.${SECRET_PUBLIC_DOMAIN}"
              TURN_PORT: "3478"
              TURN_TLS_PORT: "5349"
              TURN_SHARED_SECRET: "${SECRET_COTURN_KEY}"
              TURN_CREDENTIAL_TTL_SECONDS: "3600"
              WEBRTC_PORT_MIN: "61000"
              WEBRTC_PORT_MAX: "61010"
              WEBRTC_ENABLE_ICE_TCP: "false"
              WEBRTC_ICE_TRANSPORT_POLICY: "relay"
              SESSION_TTL_MINUTES: "30"
              DNS_ENABLED: "true"
              DNS_BIND_ADDRESS: 0.0.0.0
              DNS_PORT: "61053"
              BASE_APP_HOSTNAME: "leaks.${SECRET_PUBLIC_DOMAIN}"
              DNS_LEAK_HOSTNAME: "dns.leaks.${SECRET_PUBLIC_DOMAIN}"
              DNS_LEAK_ALTERNATIVE_IPV4: "${SVC_NGINX_ADDR}"
              DNS_UPSTREAM_HOST: 8.8.8.8
              DNS_UPSTREAM_PORT: "53"
              DNS_TTL: "30"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/config
                    port: 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/config
                    port: 8080
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      http:
        controller: main
        ports:
          http:
            port: &httpPort 8080
      webrtc:
        controller: main
        type: LoadBalancer
        loadBalancerIP: "${SVC_LEAKY_WEB_ADDR}"
        annotations:
          io.cilium/lb-ipam-ips: "${SVC_LEAKY_WEB_ADDR}"
        externalTrafficPolicy: Local
        ports:
          webrtc-61000:
            port: 61000
            protocol: UDP
          webrtc-61001:
            port: 61001
            protocol: UDP
          webrtc-61002:
            port: 61002
            protocol: UDP
          webrtc-61003:
            port: 61003
            protocol: UDP
          webrtc-61004:
            port: 61004
            protocol: UDP
          webrtc-61005:
            port: 61005
            protocol: UDP
          webrtc-61006:
            port: 61006
            protocol: UDP
          webrtc-61007:
            port: 61007
            protocol: UDP
          webrtc-61008:
            port: 61008
            protocol: UDP
          webrtc-61009:
            port: 61009
            protocol: UDP
          webrtc-61010:
            port: 61010
            protocol: UDP
          dns-tcp:
            port: 61053
            protocol: TCP
          dns-udp:
            port: 61053
            protocol: UDP

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/target: ${INGRESS_DEFAULT}
          external-dns.alpha.kubernetes.io/cloudflare-proxied: ${quote}${INGRESS_DEFAULT_CF_PROXY}${quote}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Personal Services
          gethomepage.dev/icon: /icons/network/${HOMEPAGE_ICONS_COLOR}
          gethomepage.dev/name: Leaky Web
        hosts:
          - host: leaks.${SECRET_PUBLIC_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: http
                  port: *httpPort
          - host: dns.leaks.${SECRET_PUBLIC_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: http
                  port: *httpPort
